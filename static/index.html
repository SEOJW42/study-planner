<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 앱 이름은 Planner 유지 -->
    <title>Planner</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background-color: #f2f2f7; color: #000; padding-bottom: 90px; user-select: none; }
        
        /* 앱 배너 가벼운 폰트 적용 */
        .header { padding: 20px; background: white; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; color: #000; }
        .header-title { font-size: 20px; font-weight: 400; letter-spacing: -0.5px; } /* 가벼운 느낌 */
        
        .view { display: none; padding: 10px 20px; }
        .view.active { display: block; }

        /* 스와이프 배경 및 카드 래퍼 */
        .task-wrapper { position: relative; margin-bottom: 10px; border-radius: 12px; background: transparent; overflow: hidden; }
        .swipe-actions { position: absolute; left: 0; top: 0; bottom: 0; display: flex; align-items: center; gap: 8px; padding-left: 10px; }
        .swipe-btn { height: 75%; border: none; border-radius: 8px; color: white; padding: 0 15px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .swipe-edit { background: #8e8e93; }
        .swipe-delete { background: #ff3b30; font-size: 18px; }

        .task-item { position: relative; z-index: 2; background: white; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.3s; }
        
        .task-info { display: flex; flex-direction: column; }
        .task-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .task-time { font-size: 14px; color: #666; font-variant-numeric: tabular-nums; }
        .task-actions { display: flex; align-items: center; gap: 15px; }
        .play-btn { background: #007aff; color: white; border: none; width: 44px; height: 44px; border-radius: 22px; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .stop-btn { background: #ff3b30; }
        input[type="checkbox"] { width: 24px; height: 24px; accent-color: #34c759; }

        /* 캘린더 CSS 생략 (이전과 동일) */
        .cal-wrapper { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 18px; font-weight: bold; }
        .cal-header button { background: none; border: none; font-size: 20px; color: #000; cursor: pointer; padding: 10px; }
        .cal-day-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 8px; }
        .cal-day-name { text-align: center; font-size: 12px; font-weight: bold; color: #8e8e93; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-cell { aspect-ratio: 1/1; background: #f9f9f9; border-radius: 8px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 5px; cursor: pointer; border: 1.5px solid transparent; }
        .cal-cell.empty { background: transparent; cursor: default; }
        .cal-cell.success { border-color: #34c759; background: #e8f5e9; }
        .cal-cell.fail { border-color: #ff3b30; background: #ffebee; }
        .cal-date-num { position: absolute; top: 4px; right: 6px; font-size: 13px; font-weight: bold; color: #333; }
        .cal-record { font-size: 11px; font-weight: bold; color: #666; padding: 2px 6px; border-radius: 8px; }
        .cal-record.success { color: #2e7d32; background: rgba(52, 199, 89, 0.2); }
        .cal-record.fail { color: #c62828; background: rgba(255, 59, 48, 0.2); }
        .detail-card { background: white; padding: 15px; border-radius: 12px; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* 하단 네비게이션 */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #ddd; padding-bottom: env(safe-area-inset-bottom); height: 65px; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 60px; height: 100%; cursor: pointer; color: #8e8e93; }
        .nav-item svg { stroke: #8e8e93; transition: stroke 0.2s; }
        .nav-item.active svg { stroke: #000; }

        /* 모달 및 시간 휠 스크롤 UI */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; }
        .modal-content { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 16px; width: 80%; max-width: 320px; }
        .modal-content input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .modal-btn { width: 100%; padding: 14px; background: #000; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px;}
        
        .time-picker-container { display: flex; gap: 10px; margin-top: 15px; }
        .time-box { flex: 1; display: flex; align-items: center; border: 1px solid #ccc; border-radius: 8px; padding: 0 10px; background: #fafafa; }
        .time-box select { flex: 1; border: none; background: transparent; font-size: 18px; padding: 12px 0; outline: none; appearance: none; text-align: center; font-weight: bold; color: #007aff;}
    </style>
</head>
<body>

    <!-- 메인 뷰 -->
    <div id="main-view" class="view active">
        <div class="header">
            <span class="header-title">무계획이 계획</span>
            <button onclick="openModal('register')" style="background:none; border:none; font-size:24px; cursor:pointer; color:#000;">➕</button>
        </div>
        <div id="task-container"></div>
    </div>

    <!-- 캘린더 뷰 -->
    <div id="calendar-view" class="view">
        <div class="header" style="margin-bottom: 20px;"><span class="header-title">학습 기록</span></div>
        <div class="cal-wrapper" id="cal-wrapper">
            <div class="cal-header">
                <button onclick="changeMonth(-1)">◀</button>
                <span id="month-title"></span>
                <button onclick="changeMonth(1)">▶</button>
            </div>
            <div class="cal-day-row">
                <div class="cal-day-name" style="color:#ff3b30;">일</div>
                <div class="cal-day-name">월</div>
                <div class="cal-day-name">화</div>
                <div class="cal-day-name">수</div>
                <div class="cal-day-name">목</div>
                <div class="cal-day-name">금</div>
                <div class="cal-day-name" style="color:#007aff;">토</div>
            </div>
            <div id="cal-grid" class="cal-grid"></div>
        </div>
        <div id="day-detail" class="detail-card" style="display: none;">
            <h3 id="detail-date" style="margin-top:0;">상세 기록</h3>
            <ul id="detail-list" style="padding-left: 20px;"></ul>
        </div>
    </div>

    <!-- 하단 네비게이션 -->
    <div class="bottom-nav">
        <div class="nav-item active" id="nav-main" onclick="switchTab('main')">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </div>
        <div class="nav-item" id="nav-calendar" onclick="switchTab('calendar')">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        </div>
    </div>

    <!-- 통합 모달창 (등록 / 수정 공용) -->
    <div id="form-modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modal-title" style="margin-top: 0; text-align: center;">과목 등록</h3>
            <input type="text" id="subject-input" placeholder="과목명 (예: 백준 알고리즘)">
            
            <div style="font-size: 14px; color: #666; margin-top: 15px; text-align: center;">하루 목표 시간</div>
            <!-- 아이폰 네이티브 휠을 띄우는 select 태그 -->
            <div class="time-picker-container">
                <div class="time-box">
                    <select id="target-hours"></select>
                    <span style="font-size:14px; color:#333;">시간</span>
                </div>
                <div class="time-box">
                    <select id="target-minutes"></select>
                    <span style="font-size:14px; color:#333;">분</span>
                </div>
            </div>

            <button id="modal-submit-btn" class="modal-btn">추가하기</button>
            <input type="hidden" id="edit-id"> <!-- 수정 시 사용하는 숨김 ID -->
        </div>
    </div>

    <script>
        let tasks = [];
        let activeTimerId = null;
        let timerInterval = null;
        let detailCache = {};

        // 0~23시간, 0~59분 선택지 채우기
        function initTimePickers() {
            const hSel = document.getElementById('target-hours');
            const mSel = document.getElementById('target-minutes');
            for(let i=0; i<=23; i++) hSel.innerHTML += `<option value="${i}">${i}</option>`;
            for(let i=0; i<=59; i++) mSel.innerHTML += `<option value="${i}">${i}</option>`;
        }
        initTimePickers();

        function formatTime(totalSeconds) {
            const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            const s = String(totalSeconds % 60).padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        async function loadTodayTasks() {
            const res = await fetch('/api/records/today');
            tasks = await res.json();
            tasks.forEach(t => t.seconds = t.duration_minutes * 60);
            renderTasks();
        }

        // 스와이프 제스처 이벤트 적용
        function attachSwipeEvents() {
            document.querySelectorAll('.task-item').forEach(el => {
                let startX = 0;
                el.addEventListener('touchstart', e => { startX = e.changedTouches[0].screenX; }, {passive: true});
                
                el.addEventListener('touchmove', e => {
                    let deltaX = e.changedTouches[0].screenX - startX;
                    // 오른쪽으로 밀 때만 (버튼 보이기)
                    if (deltaX > 0 && deltaX < 150) {
                        el.style.transform = `translateX(${deltaX}px)`;
                        el.style.transition = 'none';
                    }
                }, {passive: true});
                
                el.addEventListener('touchend', e => {
                    let deltaX = e.changedTouches[0].screenX - startX;
                    el.style.transition = 'transform 0.3s';
                    if (deltaX > 60) {
                        el.style.transform = `translateX(140px)`; // 버튼 공간만큼 열림 고정
                    } else {
                        el.style.transform = `translateX(0px)`; // 다시 닫힘
                    }
                }, {passive: true});
            });
        }

        function renderTasks() {
            const container = document.getElementById('task-container');
            container.innerHTML = '';
            tasks.forEach(task => {
                const isRunning = activeTimerId === task.id;
                let targetText = '';
                if (task.target_minutes > 0) {
                    const h = Math.floor(task.target_minutes / 60);
                    const m = task.target_minutes % 60;
                    targetText = `<div style="font-size:12px; color:#999; margin-top:2px;">목표: ${h>0?h+'시간 ':''}${m}분</div>`;
                }

                container.innerHTML += `
                    <div class="task-wrapper">
                        <div class="swipe-actions">
                            <button class="swipe-btn swipe-edit" onclick="openModal('edit', ${task.id})">수정</button>
                            <button class="swipe-btn swipe-delete" onclick="confirmDelete(${task.id})">🗑️</button>
                        </div>
                        <div class="task-item" id="task-${task.id}">
                            <div class="task-info">
                                <span class="task-title">${task.subject}</span>
                                <span class="task-time" id="time-${task.id}">${formatTime(task.seconds)}</span>
                                ${targetText}
                            </div>
                            <div class="task-actions">
                                <button id="btn-${task.id}" class="play-btn ${isRunning ? 'stop-btn' : ''}" onclick="toggleTimer(${task.id})">
                                    ${isRunning ? '■' : '▶'}
                                </button>
                                <input type="checkbox" ${task.is_completed ? 'checked' : ''} onchange="toggleComplete(${task.id}, this.checked)">
                            </div>
                        </div>
                    </div>
                `;
            });
            attachSwipeEvents(); // 렌더링 후 터치 이벤트 장착
        }

        // --- 모달 로직 (등록 및 수정) ---
        function openModal(mode, id = null) {
            const modal = document.getElementById('form-modal');
            const title = document.getElementById('modal-title');
            const submitBtn = document.getElementById('modal-submit-btn');
            
            if (mode === 'register') {
                title.textContent = '과목 등록';
                submitBtn.textContent = '추가하기';
                submitBtn.onclick = saveSubject;
                document.getElementById('subject-input').value = '';
                document.getElementById('target-hours').value = '0';
                document.getElementById('target-minutes').value = '0';
            } else if (mode === 'edit') {
                const task = tasks.find(t => t.id === id);
                title.textContent = '과목 수정';
                submitBtn.textContent = '수정완료';
                submitBtn.onclick = editSubject;
                document.getElementById('edit-id').value = id;
                document.getElementById('subject-input').value = task.subject;
                document.getElementById('target-hours').value = Math.floor(task.target_minutes / 60);
                document.getElementById('target-minutes').value = task.target_minutes % 60;
                
                // 열려있는 스와이프 닫기
                document.getElementById(`task-${id}`).style.transform = 'translateX(0px)';
            }
            modal.style.display = 'block';
        }

        function closeModal(e) { document.getElementById('form-modal').style.display = 'none'; }

        async function saveSubject() {
            const subject = document.getElementById('subject-input').value;
            const h = parseInt(document.getElementById('target-hours').value);
            const m = parseInt(document.getElementById('target-minutes').value);
            const target_minutes = (h * 60) + m;
            
            if (!subject) return;

            const res = await fetch('/api/records/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subject, target_minutes })
            });
            if (res.ok) { closeModal(); loadTodayTasks(); }
        }

        async function editSubject() {
            const id = document.getElementById('edit-id').value;
            const subject = document.getElementById('subject-input').value;
            const h = parseInt(document.getElementById('target-hours').value);
            const m = parseInt(document.getElementById('target-minutes').value);
            const target_minutes = (h * 60) + m;
            
            if (!subject) return;

            const res = await fetch(`/api/records/${id}/edit`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subject, target_minutes })
            });
            if (res.ok) { closeModal(); loadTodayTasks(); }
        }

        // --- 삭제 로직 ---
        async function confirmDelete(id) {
            // 삭제 의사 묻기 알림창
            if (confirm("정말로 이 과목을 삭제 하겠습니까?")) {
                const res = await fetch(`/api/records/${id}`, { method: 'DELETE' });
                if (res.ok) loadTodayTasks();
            } else {
                // 취소 시 스와이프 원상복구
                document.getElementById(`task-${id}`).style.transform = 'translateX(0px)';
            }
        }

        // 타이머 및 기타 로직 (기존과 동일)
        function toggleTimer(id) {
            const task = tasks.find(t => t.id === id);
            // 클릭 시 열려있는 스와이프가 있다면 닫기
            document.querySelectorAll('.task-item').forEach(el => el.style.transform = 'translateX(0px)');

            if (activeTimerId && activeTimerId !== id) {
                clearInterval(timerInterval);
                updateTaskToServer(activeTimerId);
                const prevBtn = document.getElementById(`btn-${activeTimerId}`);
                if(prevBtn) { prevBtn.innerHTML = '▶'; prevBtn.classList.remove('stop-btn'); }
            }
            const btn = document.getElementById(`btn-${id}`);
            if (activeTimerId === id) {
                clearInterval(timerInterval);
                activeTimerId = null;
                btn.innerHTML = '▶';
                btn.classList.remove('stop-btn');
                updateTaskToServer(id);
            } else {
                activeTimerId = id;
                btn.innerHTML = '■';
                btn.classList.add('stop-btn');
                timerInterval = setInterval(() => {
                    task.seconds++;
                    document.getElementById(`time-${id}`).textContent = formatTime(task.seconds);
                    if (task.seconds % 10 === 0) updateTaskToServer(id);
                }, 1000);
            }
        }

        function toggleComplete(id, isChecked) {
            tasks.find(t => t.id === id).is_completed = isChecked;
            updateTaskToServer(id);
        }

        async function updateTaskToServer(id) {
            const task = tasks.find(t => t.id === id);
            let duration_minutes = task.seconds > 0 ? Math.max(1, Math.ceil(task.seconds / 60)) : 0;
            await fetch(`/api/records/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ duration_minutes, is_completed: task.is_completed })
            });
        }

        async function switchTab(tabName) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`${tabName}-view`).classList.add('active');
            document.getElementById(`nav-${tabName}`).classList.add('active');
            
            if (tabName === 'calendar') {
                await loadHeatmapData(); 
                renderCalendar();
            }
        }

        // --- 캘린더 로직 (기존과 동일) ---
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let monthlyData = {};

        async function loadHeatmapData() {
            const res = await fetch('/api/heatmap/');
            const data = await res.json();
            monthlyData = {};
            data.forEach(d => { monthlyData[d.date] = d; });
        }

        function renderCalendar() {
            document.getElementById('month-title').textContent = `${currentYear}년 ${currentMonth + 1}월`;
            const grid = document.getElementById('cal-grid');
            grid.innerHTML = '';
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = new Date();

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="cal-cell empty"></div>`;

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === d);
                const dayData = monthlyData[dateStr] || { value: 0, target: 0 };
                const totalMinutes = dayData.value;
                const targetMinutes = dayData.target;
                
                let bgColorClass = ''; let textClass = '';
                if (targetMinutes > 0) {
                    if (totalMinutes >= targetMinutes) { bgColorClass = 'success'; textClass = 'success'; } 
                    else if (totalMinutes > 0) { bgColorClass = 'fail'; textClass = 'fail'; }
                } else if (totalMinutes > 0) {
                    bgColorClass = 'success'; textClass = 'success';
                }

                let recordBadge = '';
                if (totalMinutes > 0) {
                    const h = Math.floor(totalMinutes / 60); const m = totalMinutes % 60;
                    const timeText = h > 0 ? `${h}h ${m}m` : `${m}m`;
                    recordBadge = `<div class="cal-record ${textClass}">${timeText}</div>`;
                }

                grid.innerHTML += `
                    <div class="cal-cell ${bgColorClass}" style="${isToday ? 'border: 2px solid #000;' : ''}" onclick="showDetail('${dateStr}')">
                        <span class="cal-date-num">${d}</span>
                        ${recordBadge}
                    </div>
                `;
            }
        }

        function changeMonth(step) {
            currentMonth += step;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        function showDetail(dateStr) {
            document.getElementById('detail-date').textContent = `${dateStr} 상세 기록`;
            document.getElementById('day-detail').style.display = 'block';
            const list = document.getElementById('detail-list');
            if (detailCache[dateStr]) drawDetailList(detailCache[dateStr]);
            else list.innerHTML = '<li style="color:#999;">기록을 불러오는 중...</li>';
            
            fetch(`/api/records/date/${dateStr}`)
                .then(res => res.json())
                .then(data => { detailCache[dateStr] = data; drawDetailList(data); });
        }

        function drawDetailList(data) {
            const list = document.getElementById('detail-list');
            list.innerHTML = '';
            if(data.length === 0) list.innerHTML = '<li>학습 기록이 없습니다.</li>';
            else {
                data.forEach(d => {
                    const check = d.is_completed ? "✅" : "❌";
                    const targetInfo = d.target_minutes > 0 ? ` / 목표 ${d.target_minutes}분` : '';
                    list.innerHTML += `<li style="margin-bottom: 8px;">${check} ${d.subject} - <b style="color:#000;">${d.duration_minutes}분</b><span style="font-size:12px;color:#888">${targetInfo}</span></li>`;
                });
            }
        }

        loadTodayTasks();
    </script>
</body>
</html>
